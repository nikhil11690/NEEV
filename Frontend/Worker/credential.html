<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEEV — Your Skill Passport</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px;
    }

    .back {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #888;
      text-decoration: none;
      font-size: 13px;
    }

    .back:hover { color: #fff; }

    .success-badge {
      background: #052e16;
      border: 1px solid #10b981;
      color: #10b981;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 40px;
      text-align: center;
    }

    .passport-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      margin-bottom: 20px;
    }

    .worker-name {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .verified-tag {
      font-size: 12px;
      color: #10b981;
      margin-bottom: 24px;
    }

    .section-label {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .skills-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }

    .skill-chip {
      background: #0f2419;
      border: 1px solid #10b981;
      color: #10b981;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
    }

    .nsqf-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #222;
      font-size: 13px;
    }

    .nsqf-row:last-child { border-bottom: none; }

    .nsqf-skill { color: #ccc; }

    .nsqf-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .nsqf-level {
      background: #1e1e2e;
      border: 1px solid #4f46e5;
      color: #818cf8;
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 12px;
    }

    .nsqf-sector {
      color: #555;
      font-size: 12px;
    }

    .qr-section {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }

    .qr-section img {
      width: 200px;
      height: 200px;
    }

    .qr-label {
      font-size: 12px;
      color: #888;
      margin-top: 10px;
      text-align: center;
    }

    .hash-box {
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 12px 16px;
      width: 100%;
      max-width: 420px;
      margin-bottom: 20px;
    }

    .hash-label {
      font-size: 11px;
      color: #555;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hash-value {
      font-size: 11px;
      color: #444;
      font-family: monospace;
      word-break: break-all;
    }

    .download-btn {
      width: 100%;
      max-width: 420px;
      padding: 14px;
      background: #10b981;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      transition: background 0.2s;
    }

    .download-btn:hover { background: #059669; }

    .new-btn {
      width: 100%;
      max-width: 420px;
      padding: 14px;
      background: transparent;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #888;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .new-btn:hover { border-color: #555; color: #fff; }

    .whatsapp-btn {
      width: 100%;
      max-width: 420px;
      padding: 14px;
      background: #25D366;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      transition: background 0.2s;
    }

  .whatsapp-btn:hover { background: #128C7E; }

  </style>
</head>
<body>

  <a href="record.html" class="back">← Back</a>

  <div class="success-badge">✓ Credential Generated</div>
  <h1 id="pageTitle">Aapka Skill Passport</h1>
  <p class="subtitle">Yeh QR code aapki skill ka proof hai</p>

  <div class="passport-card">
    <div class="worker-name" id="workerName">—</div>
    <div class="verified-tag">✓ NEEV Verified Worker</div>

    <div class="section-label">Skills</div>
    <div class="skills-grid" id="skillsGrid"></div>

    <div class="section-label">NSQF Mapping</div>
    <div id="nsqfList"></div>
  </div>

  <div class="qr-section">
    <img id="qrImage" src="" alt="QR Code" />
    <div class="qr-label">Employer ko yeh scan karne do</div>
  </div>

  <div class="hash-box">
    <div class="hash-label">Security Hash (SHA256)</div>
    <div class="hash-value" id="hashValue">—</div>
  </div>

  <button class="download-btn" onclick="downloadQR()">⬇ QR Download Karo</button>
  <button class="whatsapp-btn" onclick="shareWhatsApp()">📲 WhatsApp Pe Share Karo</button>
  <button class="new-btn" onclick="window.location.href='record.html'">Naya Passport Banao</button>

  <script>
    const data = JSON.parse(sessionStorage.getItem('neev_result'));

    if (!data) {
      window.location.href = 'record.html';
    } else {
      // Worker name
      document.getElementById('workerName').innerText = data.name;

      // Skills chips
      const grid = document.getElementById('skillsGrid');
      data.skills.forEach(skill => {
        const chip = document.createElement('div');
        chip.className = 'skill-chip';
        chip.innerText = skill;
        grid.appendChild(chip);
      });

      // NSQF mapping
      const nsqfList = document.getElementById('nsqfList');
      data.nsqf_mapping.forEach(item => {
        const row = document.createElement('div');
        row.className = 'nsqf-row';
        row.innerHTML = `
          <span class="nsqf-skill">${item.skill}</span>
          <div class="nsqf-right">
            <span class="nsqf-level">Level ${item.nsqf_level}</span>
            <span class="nsqf-sector">${item.sector}</span>
          </div>`;
        nsqfList.appendChild(row);
      });

      // QR code
      document.getElementById('qrImage').src = `data:image/png;base64,${data.qr_code_base64}`;

      function shareWhatsApp() {
        const text = `Mera NEEV Skill Passport dekhein!\n\nNaam: ${data.name}\nSkills: ${data.skills.join(', ')}\n\nVerify karo: https://neev-1.onrender.com/employer/scan.html`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
      }

      // Hash
      document.getElementById('hashValue').innerText = data.hash;
    }

    function downloadQR() {
      const link = document.createElement('a');
      link.download = `NEEV_${data.name}_Passport.png`;
      link.href = `data:image/png;base64,${data.qr_code_base64}`;
      link.click();
    }
  </script>

</body>
</html>
