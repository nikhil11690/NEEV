<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEEV — Your Skill Passport</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a href="../index.html" class="brandmark"><span class="seal-dot"></span>NEEV</a>
    <a href="record.html" class="back-link">+ New passport</a>
  </div>

  <nav class="crumbs">Worker <span class="sep">/</span> Record <span class="sep">/</span> Confirm <span class="sep">/</span> <span class="on">Passport</span></nav>
  <div class="banner good">✓ Credential generated</div>
  <h1 style="margin-bottom:24px;">Your skill passport</h1>

  <div class="passport">
    <div class="identity">
      <div class="seal stamp"><span class="seal-mark">N</span></div>
      <div>
        <div class="name" id="workerName">—</div>
        <div class="tag"><span class="dot"></span>NEEV Verified Worker</div>
      </div>
    </div>

    <div class="eyebrow">Skills</div>
    <div class="chips" id="skillsGrid" style="margin-bottom:22px;"></div>

    <div class="eyebrow">NSQF mapping</div>
    <div id="nsqfList"></div>
  </div>

  <div class="qr-frame">
    <img id="qrImage" src="" alt="QR Code" />
    <div class="cap">Let the employer scan this</div>
  </div>

  <div class="hash-box">
    <div class="lbl">Security hash (SHA256)</div>
    <div class="val" id="hashValue">—</div>
  </div>

  <button class="btn btn-primary" onclick="downloadQR()" style="margin-bottom:10px;">⬇ Download QR</button>
  <button class="btn btn-whatsapp" onclick="shareWhatsApp()" style="margin-bottom:10px;">📲 Share on WhatsApp</button>
  <a class="btn btn-ghost" href="record.html">Create another passport</a>
</div>

<script>
  const data = JSON.parse(sessionStorage.getItem('neev_result') || 'null');
  if (!data) window.location.href = 'record.html';
  else {
    document.getElementById('workerName').innerText = data.name;

    const grid = document.getElementById('skillsGrid');
    data.skills.forEach(skill => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.innerHTML = `<span>${skill}</span>`;
      grid.appendChild(chip);
    });

    const nsqfList = document.getElementById('nsqfList');
    data.nsqf_mapping.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'ledger-row';
      const conf = data.confidence ? data.confidence[i] : null;
      row.innerHTML = `
        <span class="ledger-skill">${item.skill}${data.years && data.years[i] > 0 ? `<span class="yrs">${data.years[i]} yrs</span>` : ''}</span>
        <div class="ledger-right">
          <span class="pill level">Level ${item.nsqf_level}</span>
          ${conf ? `<span class="pill conf-${conf}">${conf}</span>` : ''}
        </div>`;
      nsqfList.appendChild(row);
    });

    document.getElementById('qrImage').src = `data:image/png;base64,${data.qr_code_base64}`;
    document.getElementById('hashValue').innerText = data.hash;
  }

  function downloadQR() {
    const link = document.createElement('a');
    link.download = `NEEV_${data.name}_Passport.png`;
    link.href = `data:image/png;base64,${data.qr_code_base64}`;
    link.click();
  }

  function shareWhatsApp() {
    const text = `Mera NEEV Skill Passport dekhein!\n\nNaam: ${data.name}\nSkills: ${data.skills.join(', ')}\n\nVerify karo: https://neev-1.onrender.com`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
  }
</script>
</body>
</html>
