<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEEV — Confirm Skills</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="shell">
  <div class="topbar">
    <a href="../index.html" class="brandmark"><span class="seal-dot"></span>NEEV</a>
    <a href="record.html" class="back-link">← Back</a>
  </div>

  <nav class="crumbs">Worker <span class="sep">/</span> Record <span class="sep">/</span> <span class="on">Confirm</span> <span class="sep">/</span> Passport</nav>
  <h1>Confirm your skills</h1>
  <p class="lede">Here's what NEEV heard. Remove anything that's wrong, then generate your passport.</p>

  <div class="card">
    <div class="eyebrow">Worker</div>
    <div class="identity" style="margin-bottom:0;">
      <div>
        <div class="name" id="workerName">—</div>
        <div class="tag"><span class="dot"></span>Draft — not yet generated</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="eyebrow">What you said</div>
    <p style="font-size:14px;color:var(--ink-dim);line-height:1.7;" id="transcriptText">—</p>
  </div>

  <div class="card">
    <div class="eyebrow">Extracted skills — tap ✕ to remove</div>
    <div class="chips" id="skillsGrid"></div>
  </div>

  <div class="card">
    <div class="eyebrow">NSQF mapping</div>
    <div id="nsqfList"></div>
  </div>

  <button class="btn btn-good" id="confirmBtn" onclick="confirmSkills()">This looks right — generate passport →</button>
  <div class="status-line" id="status"></div>
</div>

<script src="../js/api.js"></script>
<script>
  const data = JSON.parse(sessionStorage.getItem('neev_process_result') || 'null');
  if (!data) window.location.href = 'record.html';

  let removedIndices = new Set();

  document.getElementById('workerName').innerText = data.name;
  document.getElementById('transcriptText').innerText = data.transcript;

  const grid = document.getElementById('skillsGrid');
  data.skills.forEach((skill, i) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.id = `chip-${i}`;
    chip.innerHTML = `<span>${skill}</span><button onclick="toggleSkill(${i})">✕</button>`;
    grid.appendChild(chip);
  });

  const nsqfList = document.getElementById('nsqfList');
  data.nsqf_mapping.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'ledger-row';
    row.id = `nsqf-${i}`;
    row.innerHTML = `
      <span class="ledger-skill">${item.skill}</span>
      <div class="ledger-right">
        <span class="pill level">Level ${item.nsqf_level}</span>
        <span class="pill">${item.sector}</span>
      </div>`;
    nsqfList.appendChild(row);
  });

  function toggleSkill(i) {
    const chip = document.getElementById(`chip-${i}`);
    const row = document.getElementById(`nsqf-${i}`);
    if (removedIndices.has(i)) {
      removedIndices.delete(i);
      chip.classList.remove('removed');
      row.classList.remove('muted');
    } else {
      removedIndices.add(i);
      chip.classList.add('removed');
      row.classList.add('muted');
    }
    document.getElementById('confirmBtn').disabled = removedIndices.size === data.skills.length;
  }

  async function confirmSkills() {
    const confirmedSkills = [];
    const confirmedLevels = [];
    data.nsqf_mapping.forEach((item, i) => {
      if (!removedIndices.has(i)) {
        confirmedSkills.push(item.skill);
        confirmedLevels.push(item.nsqf_level === 'N/A' ? 0 : item.nsqf_level);
      }
    });

    setStatus('Generating your QR passport…', '');
    document.getElementById('confirmBtn').disabled = true;

    try {
      const result = await neevFetch('/generate-credential', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: data.name, skills: confirmedSkills, nsqf_levels: confirmedLevels })
      });

      // ✅ FIX: worker_id aur interview_completed bhi save karo
      sessionStorage.setItem('neev_result', JSON.stringify({
        name: data.name,
        skills: confirmedSkills,
        nsqf_mapping: data.nsqf_mapping.filter((_, i) => !removedIndices.has(i)),
        qr_code_base64: result.qr_code_base64,
        worker_id: result.worker_id,
        interview_completed: result.interview_completed || false
      }));

      // worker_id alag se bhi store karo — interview page use karega
      if (result.worker_id) {
        sessionStorage.setItem('neev_worker_id', result.worker_id);
      }

      window.location.href = 'credential.html';
    } catch (err) {
      setStatus('Error aaya. Backend chalu hai?', 'error');
      document.getElementById('confirmBtn').disabled = false;
    }
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.innerText = msg;
    el.className = 'status-line ' + type;
  }
</script>
</body>
</html>
