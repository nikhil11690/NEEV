<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEEV — Verify Credential</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px;
    }

    .back {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #888;
      text-decoration: none;
      font-size: 13px;
    }

    .back:hover { color: #fff; }

    h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 40px;
      text-align: center;
    }

    .scan-options {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      width: 100%;
      max-width: 480px;
    }

    .option-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .option-btn.active {
      border-color: #6366f1;
      color: #fff;
      background: #1e1e2e;
    }

    .option-btn:hover { border-color: #555; color: #fff; }

    /* Camera section */
    .camera-section {
      width: 100%;
      max-width: 480px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .camera-section.show { display: flex; }

    video {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
    }

    canvas { display: none; }

    .camera-status {
      font-size: 13px;
      color: #f59e0b;
      text-align: center;
    }

    /* Upload section */
    .upload-section {
      width: 100%;
      max-width: 480px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .upload-section.show { display: flex; }

    .upload-area {
      width: 100%;
      border: 2px dashed #2a2a2a;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .upload-area:hover { border-color: #6366f1; }

    .upload-icon { font-size: 40px; margin-bottom: 12px; }
    .upload-text { font-size: 14px; color: #888; }

    input[type="file"] { display: none; }

    /* Result card */
    .result-card {
      width: 100%;
      max-width: 480px;
      background: #1a1a1a;
      border-radius: 20px;
      padding: 32px;
      display: none;
      margin-top: 8px;
    }

    .result-card.show { display: block; }

    .valid-badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .valid-badge.valid {
      background: #052e16;
      border: 1px solid #10b981;
      color: #10b981;
    }

    .valid-badge.invalid {
      background: #2d0a0a;
      border: 1px solid #ef4444;
      color: #ef4444;
    }

    .worker-name {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .verified-tag {
      font-size: 12px;
      color: #10b981;
      margin-bottom: 24px;
    }

    .section-label {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      margin-top: 20px;
    }

    .nsqf-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #222;
      font-size: 13px;
    }

    .nsqf-row:last-child { border-bottom: none; }
    .nsqf-skill { color: #ccc; }

    .nsqf-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .nsqf-level {
      background: #1e1e2e;
      border: 1px solid #4f46e5;
      color: #818cf8;
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 12px;
    }

    .nsqf-sector { color: #555; font-size: 12px; }

    .tampered-msg {
      color: #ef4444;
      font-size: 14px;
      line-height: 1.6;
      margin-top: 8px;
    }

    .scan-again-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #888;
      font-size: 14px;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.2s;
    }

    .scan-again-btn:hover { border-color: #555; color: #fff; }
  </style>
</head>
<body>

  <a href="../index.html" class="back">← Back</a>

  <h1>Worker Verify Karo</h1>
  <p class="subtitle">QR scan karo ya image upload karo</p>

  <div class="scan-options">
    <div class="option-btn" id="cameraBtn" onclick="showCamera()">📷 Camera Se Scan</div>
    <div class="option-btn" id="uploadBtn" onclick="showUpload()">🖼️ Image Upload Karo</div>
  </div>

  <!-- Camera Section -->
  <div class="camera-section" id="cameraSection">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="camera-status" id="cameraStatus">Camera shuru ho rahi hai...</div>
  </div>

  <!-- Upload Section -->
  <div class="upload-section" id="uploadSection">
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">📁</div>
      <div class="upload-text">QR code ki image yahan click karke upload karo</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)" />
  </div>

  <!-- Result Card -->
  <div class="result-card" id="resultCard">
    <div class="valid-badge" id="validBadge"></div>
    <div id="workerDetails"></div>
    <button class="scan-again-btn" onclick="resetScanner()">Dobara Scan Karo</button>
  </div>

  <script>
    const BACKEND = 'https://neev-1.onrender.com';
    let videoStream = null;
    let scanInterval = null;

    function showCamera() {
      document.getElementById('cameraBtn').classList.add('active');
      document.getElementById('uploadBtn').classList.remove('active');
      document.getElementById('cameraSection').classList.add('show');
      document.getElementById('uploadSection').classList.remove('show');
      document.getElementById('resultCard').classList.remove('show');
      startCamera();
    }

    function showUpload() {
      document.getElementById('uploadBtn').classList.add('active');
      document.getElementById('cameraBtn').classList.remove('active');
      document.getElementById('uploadSection').classList.add('show');
      document.getElementById('cameraSection').classList.remove('show');
      document.getElementById('resultCard').classList.remove('show');
      stopCamera();
    }

    async function startCamera() {
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        const video = document.getElementById('video');
        video.srcObject = videoStream;
        document.getElementById('cameraStatus').innerText = 'QR code camera ke saamne rakho';

        // Scan every 500ms
        scanInterval = setInterval(scanFromCamera, 500);
      } catch (err) {
        document.getElementById('cameraStatus').innerText = 'Camera access nahi mila. Image upload try karo.';
      }
    }

    function stopCamera() {
      if (videoStream) {
        videoStream.getTracks().forEach(t => t.stop());
        videoStream = null;
      }
      if (scanInterval) {
        clearInterval(scanInterval);
        scanInterval = null;
      }
    }

    function scanFromCamera() {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');

      if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height);

      if (code) {
        stopCamera();
        document.getElementById('cameraStatus').innerText = 'QR mil gaya! Verify ho raha hai...';
        processQRData(code.data);
      }
    }

    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const img = new Image();
      const reader = new FileReader();

      reader.onload = (e) => {
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);

          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height);

          if (code) {
            processQRData(code.data);
          } else {
            alert('QR code nahi mila image mein. Dobara try karo.');
          }
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    async function processQRData(rawData) {
      let parsed;
      try {
        parsed = JSON.parse(rawData);
      } catch (e) {
        alert('Invalid QR data.');
        return;
      }

      try {
        const response = await fetch('http://127.0.0.1:8000/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            data: parsed.data,
            hash: parsed.hash
          })
        });

        const result = await response.json();
        showResult(result);

      } catch (err) {
        alert('Server se connect nahi ho paya.');
      }
    }

    function showResult(result) {
      const card = document.getElementById('resultCard');
      const badge = document.getElementById('validBadge');
      const details = document.getElementById('workerDetails');

      document.getElementById('cameraSection').classList.remove('show');
      document.getElementById('uploadSection').classList.remove('show');
      card.classList.add('show');

      if (result.valid) {
        badge.className = 'valid-badge valid';
        badge.innerText = '✓ Verified — Genuine Credential';

        const w = result.worker_data;
        const skills = w.skills || [];
        const levels = w.nsqf_levels || [];

        details.innerHTML = `
          <div class="worker-name">${w.name}</div>
          <div class="verified-tag">✓ NEEV Verified Worker</div>
          <div class="section-label">NSQF Skill Mapping</div>
          ${skills.map((skill, i) => `
            <div class="nsqf-row">
              <span class="nsqf-skill">${skill}</span>
              <div class="nsqf-right">
                <span class="nsqf-level">Level ${levels[i] || 'N/A'}</span>
              </div>
            </div>`).join('')}`;
      } else {
        badge.className = 'valid-badge invalid';
        badge.innerText = '✗ Invalid — Credential Tampered';
        details.innerHTML = `
          <div class="tampered-msg">
            Yeh credential valid nahi hai. Data ke saath chheda-chaadi ki gayi hai ya QR corrupt ho gaya hai.
          </div>`;
      }
    }

    function resetScanner() {
      document.getElementById('resultCard').classList.remove('show');
      document.getElementById('cameraBtn').classList.remove('active');
      document.getElementById('uploadBtn').classList.remove('active');
      document.getElementById('cameraSection').classList.remove('show');
      document.getElementById('uploadSection').classList.remove('show');
      document.getElementById('fileInput').value = '';
    }
  </script>

</body>
</html>
